<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Arcade Bubble Shooter</title> 
    <style> 
        body { 
            margin: 0; 
            background: #111; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        } 
        #game-container { 
            position: relative; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        } 
        canvas { 
            background: #222; 
            display: block; 
            border: 4px solid #444; 
            border-radius: 4px; 
        } 
        #ui { 
            text-align: center; 
            margin-top: 10px; 
            font-size: 18px; 
            display: flex;
            gap: 20px;
        } 
    </style> 
</head> 
<body> 

<div id="game-container"> 
    <canvas id="gameCanvas" width="400" height="500"></canvas> 
</div> 
<div id="ui">
    <div>Timer: <span id="timer-val">60</span>s</div>
    <div>Score: <span id="score">0</span></div>
</div> 

<script> 
const canvas = document.getElementById('gameCanvas'); 
const ctx = canvas.getContext('2d'); 
const scoreEl = document.getElementById('score'); 
const timerEl = document.getElementById('timer-val'); 

// Game configurations 
const BUBBLE_RADIUS = 18; 
const ROWS = 6; 
const COLS = 10; 
const COLORS = ['#ff3333', '#33ff33', '#3333ff', '#ffff33', '#ff33ff']; 

// Game state variables 
let score = 0; 
let grid = []; 
let currentBubble = null; 
let mousePos = { x: canvas.width / 2, y: canvas.height }; 
let timer = 60; 
let timerInterval = null; 
let gameOver = false; 

// Shooter coordinates 
const shooterX = canvas.width / 2; 
const shooterY = canvas.height - BUBBLE_RADIUS - 10; 

// Grid preparation 
function initGrid() { 
    for (let r = 0; r < ROWS; r++) { 
        grid[r] = []; 
        for (let c = 0; c < COLS; c++) { 
            grid[r][c] = (r < 4) ? COLORS[Math.floor(Math.random() * COLORS.length)] : null; 
        } 
    } 
} 

// Generate next projectile bubble 
function spawnBubble() { 
    currentBubble = { 
        x: shooterX, 
        y: shooterY, 
        color: COLORS[Math.floor(Math.random() * COLORS.length)], 
        vx: 0, 
        vy: 0, 
        active: false 
    }; 
} 

// Track mouse position on canvas 
canvas.addEventListener('mousemove', (e) => { 
    if (gameOver) return; 
    const rect = canvas.getBoundingClientRect(); 
    mousePos.x = e.clientX - rect.left; 
    mousePos.y = e.clientY - rect.top; 
}); 

// Fire bubble on mouse click 
canvas.addEventListener('click', () => { 
    if (gameOver) return; // గేమ్ అయిపోతే క్లిక్స్ పనిచేయవు
    
    if (currentBubble && !currentBubble.active) { 
        const angle = Math.atan2(mousePos.y - shooterY, mousePos.x - shooterX); 
        const speed = 8; 
        currentBubble.vx = Math.cos(angle) * speed; 
        currentBubble.vy = Math.sin(angle) * speed; 
        currentBubble.active = true; 

        // ప్రతి షాట్ కి 5 పాయింట్లు కట్ అవుతాయి (మైనస్ లోకి వెళ్తుంది)
        score -= 5; 
        scoreEl.innerText = score; 
    } 
}); 

// Detect collision with standard grid spaces 
function checkGridCollision(bubble) { 
    for (let r = 0; r < ROWS; r++) { 
        for (let c = 0; c < COLS; c++) { 
            if (grid[r][c]) { 
                const bx = c * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS + (r % 2 * BUBBLE_RADIUS); 
                const by = r * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS; 
                const dist = Math.hypot(bubble.x - bx, bubble.y - by); 
                if (dist < BUBBLE_RADIUS * 1.8) { 
                    return true; 
                } 
            } 
        } 
    } 
    return false; 
} 

// Map floating coordinate positions back to closest static row/column coordinates 
function snapToGrid(bubble) { 
    let targetRow = Math.min(ROWS - 1, Math.max(0, Math.floor(bubble.y / (BUBBLE_RADIUS * 2)))); 
    let targetCol = Math.min(COLS - 1, Math.max(0, Math.floor((bubble.x - (targetRow % 2 * BUBBLE_RADIUS)) / (BUBBLE_RADIUS * 2)))); 
    grid[targetRow][targetCol] = bubble.color; 
    
    popMatches(targetRow, targetCol, bubble.color); 
    spawnBubble(); 
} 

// Basic neighborhood search algorithm for processing matching bubble groups 
function popMatches(row, col, color) { 
    let matches = [[row, col]]; 
    let queue = [[row, col]]; 
    let visited = Array(ROWS).fill().map(() => Array(COLS).fill(false)); 
    visited[row][col] = true; 

    while (queue.length > 0) { 
        let [r, c] = queue.shift(); 
        let neighbors = [ 
            [r, c-1], [r, c+1], 
            [r-1, c], [r+1, c], 
            [r-1, c + (r % 2 === 0 ? -1 : 1)], 
            [r+1, c + (r % 2 === 0 ? -1 : 1)] 
        ]; 
        for (let [nr, nc] of neighbors) { 
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) { 
                if (!visited[nr][nc] && grid[nr][nc] === color) { 
                    visited[nr][nc] = true; 
                    matches.push([nr, nc]); 
                    queue.push([nr, nc]); 
                } 
            } 
        } 
    } 

    if (matches.length >= 3) { 
        matches.forEach(([r, c]) => grid[r][c] = null); 
        score += matches.length * 10; 
        scoreEl.innerText = score; 
    } 
} 

// Start CountDown Timer 
function startTimer() {
    timerInterval = setInterval(() => {
        if (timer > 0) {
            timer--;
            timerEl.innerText = timer;
        } else {
            endGame();
        }
    }, 1000);
}

// End Game Function
function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
}

// Core physics and collision update pass loop 
function update() { 
    if (gameOver) return; 

    if (currentBubble && currentBubble.active) { 
        currentBubble.x += currentBubble.vx; 
        currentBubble.y += currentBubble.vy; 

        if (currentBubble.x - BUBBLE_RADIUS <= 0 || currentBubble.x + BUBBLE_RADIUS >= canvas.width) { 
            currentBubble.vx *= -1; 
        } 

        if (currentBubble.y - BUBBLE_RADIUS <= 0 || checkGridCollision(currentBubble)) { 
            currentBubble.active = false; 
            snapToGrid(currentBubble); 
        } 
    } 
} 

// Frame drawing rendering pass loop 
function draw() { 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    // Draw Static Grid structure layout 
    for (let r = 0; r < ROWS; r++) { 
        for (let c = 0; c < COLS; c++) { 
            if (grid[r][c]) { 
                const bx = c * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS + (r % 2 * BUBBLE_RADIUS); 
                const by = r * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS; 
                drawCircle(bx, by, grid[r][c]); 
            } 
        } 
    } 

    // Draw aiming pointer guide system 
    if (!gameOver) {
        ctx.beginPath(); 
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; 
        ctx.setLineDash([5, 5]); 
        ctx.moveTo(shooterX, shooterY); 
        ctx.lineTo(mousePos.x, mousePos.y); 
        ctx.stroke(); 
        ctx.setLineDash([]); 
    }

    // Draw active project launcher ammo bubble 
    if (currentBubble && !gameOver) { 
        drawCircle(currentBubble.x, currentBubble.y, currentBubble.color); 
    } 

    // Game Over Overlay స్క్రీన్ ని డ్రా చేయడం
    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.fillStyle = 'white';
        ctx.font = '20px sans-serif';
        ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
    }
} 

function drawCircle(x, y, color) { 
    ctx.beginPath(); 
    ctx.arc(x, y, BUBBLE_RADIUS - 2, 0, Math.PI * 2); 
    ctx.fillStyle = color; 
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; 
    ctx.shadowBlur = 4; 
    ctx.fill(); 
    ctx.closePath(); 
    ctx.shadowBlur = 0; 
} 

function loop() { 
    update(); 
    draw(); 
    requestAnimationFrame(loop); 
} 

// Engine Initialization entry point 
initGrid(); 
spawnBubble(); 
startTimer(); // టైమర్ ని స్టార్ట్ చేస్తుంది
loop(); 
</script> 
</body> 
</html>
