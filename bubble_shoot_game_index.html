<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Arcade Bubble Shooter</title> 
    <style> 
        body { 
            margin: 0; 
            background: #111; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        } 
        #game-container { 
            position: relative; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        } 
        canvas { 
            background: #222; 
            display: block; 
            border: 4px solid #444; 
            border-radius: 4px; 
        } 
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 400px; 
            height: 500px; 
            background-color: rgba(0, 0, 0, 0.85); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 4px solid #444;
            border-radius: 4px;
            z-index: 10;
            box-sizing: border-box;
            text-align: center;
            padding: 20px;
        }
        #game-overlay.hidden {
            display: none;
        }
        #overlay-title {
            font-size: 32px;
            font-weight: bold;
            color: #f43f5e; 
            margin-bottom: 15px;
        }
        #overlay-desc {
            font-size: 18px;
            color: white;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            background-color: #10b981; 
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #059669;
        }

        #ui {
            text-align: center;
            margin-top: 10px;
            font-size: 18px;
            display: flex;
            gap: 25px;
            background: #222;
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid #444;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
 
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="400" height="500"></canvas>
     <div id="game-overlay" class="hidden">
        	<h1 id="overlay-title">Game Over!</h1>
        	<p id="overlay-desc">You scored 0 points.</p>
        	<button class="btn" id="play-again-btn">Play Again</button>
    </div>
</div>
 
<div id="ui">
    <div style="color: #ffcc00;">Coins🪙: <span id="db-coins">0</span></div>
    <div style="color: #4285F4;">Points💎: <span id="db-points">0</span></div>
    <div style="color: #ffcc00;">Lives🩷: <span id="lives-val">10</span>/10</div>
    <div>Timer⏱️: <span id="timer-val">60</span>s</div>
    <div>Score💎: <span id="score">0</span></div>
    <a href="index.html" style="color:#fff;">End Game</a>
</div> 

<script>
const canvas = document.getElementById('gameCanvas'); 
const ctx = canvas.getContext('2d'); 
const scoreEl = document.getElementById('score'); 
const timerEl = document.getElementById('timer-val'); 
const livesEl = document.getElementById('lives-val'); 

const gameOverlay = document.getElementById('game-overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayDesc = document.getElementById('overlay-desc');
const playAgainBtn = document.getElementById('play-again-btn');

// Firebase Initialization (ఫైర్ బేస్ సెటప్)
const firebaseConfig = { 
    apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
    authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
    projectId: "gemini-spinning-wheel-game" 
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Wallet Data (Coins & Points) కోసం లిజనర్
auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("Users").doc(user.uid).onSnapshot(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('db-coins').innerText = data.coins || 0;
                document.getElementById('db-points').innerText = data.points || 0;
            }
        });
    }
});

// Game configurations
const BUBBLE_RADIUS = 18;
const ROWS = 6; 
const COLS = 10; 
const COLORS = ['#ff3333', '#33ff33', '#3333ff', '#ffff33', '#ff33ff']; 

// Game state variables 
let score = 0; 
let grid = []; 
let currentBubble = null; 
let mousePos = { x: canvas.width / 2, y: canvas.height }; 
let timer = 60; 
let timerInterval = null; 
let limitInterval = null; // కొత్త లిమిట్ టైమర్ ఇంటర్వెల్
let gameOver = false; 
let limitReached = false; 

const shooterX = canvas.width / 2; 
const shooterY = canvas.height - BUBBLE_RADIUS - 10; 

function initGrid() { 
    grid = []; 
    for (let r = 0; r < ROWS; r++) { 
        grid[r] = []; 
        for (let c = 0; c < COLS; c++) { 
            grid[r][c] = (r < 4) ? COLORS[Math.floor(Math.random() * COLORS.length)] : null; 
        } 
    } 
} 

function spawnBubble() { 
    currentBubble = { 
        x: shooterX, 
        y: shooterY, 
        color: COLORS[Math.floor(Math.random() * COLORS.length)], 
        vx: 0, 
        vy: 0, 
        active: false 
    }; 
} 

canvas.addEventListener('mousemove', (e) => { 
    if (gameOver) return; 
    const rect = canvas.getBoundingClientRect(); 
    mousePos.x = e.clientX - rect.left; 
    mousePos.y = e.clientY - rect.top; 
}); 

canvas.addEventListener('click', () => { 
    if (gameOver) return; 
    
    if (currentBubble && !currentBubble.active) { 
        const angle = Math.atan2(mousePos.y - shooterY, mousePos.x - shooterX); 
        const speed = 8; 
        currentBubble.vx = Math.cos(angle) * speed; 
        currentBubble.vy = Math.sin(angle) * speed; 
        currentBubble.active = true; 

        score -= 5; 
        scoreEl.innerText = score; 
    } 
}); 

function checkGridCollision(bubble) { 
    for (let r = 0; r < ROWS; r++) { 
        for (let c = 0; c < COLS; c++) { 
            if (grid[r][c]) { 
                const bx = c * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS + (r % 2 * BUBBLE_RADIUS); 
                const by = r * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS; 
                const dist = Math.hypot(bubble.x - bx, bubble.y - by); 
                if (dist < BUBBLE_RADIUS * 1.8) { 
                    return true; 
                } 
            } 
        } 
    } 
    return false; 
} 

function snapToGrid(bubble) { 
    let targetRow = Math.min(ROWS - 1, Math.max(0, Math.floor(bubble.y / (BUBBLE_RADIUS * 2)))); 
    let targetCol = Math.min(COLS - 1, Math.max(0, Math.floor((bubble.x - (targetRow % 2 * BUBBLE_RADIUS)) / (BUBBLE_RADIUS * 2)))); 
    grid[targetRow][targetCol] = bubble.color; 
    
    popMatches(targetRow, targetCol, bubble.color); 
    spawnBubble(); 
} 

function popMatches(row, col, color) { 
    let matches = [[row, col]]; 
    let queue = [[row, col]]; 
    let visited = Array(ROWS).fill().map(() => Array(COLS).fill(false)); 
    visited[row][col] = true; 

    while (queue.length > 0) { 
        let [r, c] = queue.shift(); 
        let neighbors = [ 
            [r, c-1], [r, c+1], 
            [r-1, c], [r+1, c], 
            [r-1, c + (r % 2 === 0 ? -1 : 1)], 
            [r+1, c + (r % 2 === 0 ? -1 : 1)] 
        ]; 
        for (let [nr, nc] of neighbors) { 
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) { 
                if (!visited[nr][nc] && grid[nr][nc] === color) { 
                    visited[nr][nc] = true; 
                    matches.push([nr, nc]); 
                    queue.push([nr, nc]); 
                } 
            } 
        } 
    } 

    if (matches.length >= 3) { 
        matches.forEach(([r, c]) => grid[r][c] = null); 
        score += matches.length * 10; 
        scoreEl.innerText = score; 
    } 
} 

function resetGame() {
    score = 0;
    scoreEl.innerText = score;
    timer = 60;
    timerEl.innerText = timer;
    gameOver = false;
    limitReached = false;
    
    if (limitInterval) clearInterval(limitInterval); 
    
    gameOverlay.classList.add('hidden');
    overlayTitle.textContent = 'Game Over!';
    overlayTitle.style.color = '#f43f5e';
    playAgainBtn.classList.remove('hidden'); 

    initGrid();
    spawnBubble();
}

function getValidAttempts() {
    let attempts = JSON.parse(localStorage.getItem('bubble_shooter_attempts')) || [];
    const oneHourAgo = Date.now() - 60 * 60 * 1000; 
    
    attempts = attempts.filter(timestamp => timestamp > oneHourAgo);
    localStorage.setItem('bubble_shooter_attempts', JSON.stringify(attempts));
    return attempts;
}

function checkAndStartGame() {
    let attempts = getValidAttempts();
    
    if (attempts.length >= 10) {
        limitReached = true;
        gameOver = true;
        livesEl.innerText = 0; 
        showLimitReachedOverlay(); 
    } else {
        attempts.push(Date.now());
        localStorage.setItem('bubble_shooter_attempts', JSON.stringify(attempts));
        
        livesEl.innerText = 10 - attempts.length;
        startTimer();
    }
}

// లిమిట్ రీచ్ అయినప్పుడు కౌంట్‌డౌన్ టైమర్ ని రన్ చేసే లాజిక్
function showLimitReachedOverlay() {
    overlayTitle.textContent = 'LIMIT REACHED!';
    overlayTitle.style.color = '#ffcc00';
    playAgainBtn.classList.add('hidden'); 
    gameOverlay.classList.remove('hidden');
    
    updateLimitCountdown(); // వెంటనే మొదటి సెకండ్ అప్‌డేట్ రన్ అవ్వడానికి
    limitInterval = setInterval(updateLimitCountdown, 1000);
}

function updateLimitCountdown() {
    let attempts = getValidAttempts(); // ఆటోమేటిక్‌గా పాత టైమ్‌స్టాంప్స్ ఫిల్టర్ చేస్తుంది
    
    // ఒకవేళ వన్ అవర్ అయిపోయి లిమిట్ ఖాళీ అయితే ఆటోమేటిక్‌గా అన్‌లాక్ అవుతుంది
    if (attempts.length < 10) {
        clearInterval(limitInterval);
        resetGame();
        checkAndStartGame();
        return;
    }

    // మొదటి (ఓల్డెస్ట్) షాట్ ఆధారంగా నెక్స్ట్ అవైలబుల్ టైమ్ లెక్కించడం
    const oldestAttempt = attempts[0];
    const nextAvailableTime = oldestAttempt + (60 * 60 * 1000);
    const timeLeft = nextAvailableTime - Date.now();

    if (timeLeft <= 0) {
        clearInterval(limitInterval);
        resetGame();
        checkAndStartGame();
    } else {
        const minutes = Math.floor(timeLeft / (1000 * 60));
        const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
        
        const strMinutes = String(minutes).padStart(2, '0');
        const strSeconds = String(seconds).padStart(2, '0');
        
        overlayDesc.innerHTML = `You can only play 10 times per hour.<br><br><span style="color: #ffcc00; font-weight: bold; font-size: 22px; letter-spacing: 1px;">Next Life In: ${strMinutes}:${strSeconds}</span>`;
    }
}

playAgainBtn.addEventListener('click', () => {
    resetGame();
    checkAndStartGame(); 
});

function startTimer() {
    timerInterval = setInterval(() => {
        if (timer > 0) {
            timer--;
            timerEl.innerText = timer;
        } else {
            endGame();
        }
    }, 1000);
}

function endGame() {
    gameOver = true;
    clearInterval(timerInterval);
    overlayDesc.textContent = `You scored ${score} points.`;
    gameOverlay.classList.remove('hidden');

    // స్కోర్ ని Firestore పాయింట్స్ లోకి సేవ్ చేయడం
    if (score > 0 && auth.currentUser) {
        db.collection("Users").doc(auth.currentUser.uid).update({
            points: firebase.firestore.FieldValue.increment(score)
        }).then(() => {
            console.log("Points successfully saved to Firestore!");
        }).catch((err) => {
            console.error("Error saving points: ", err);
        });
    }
}

function update() {
  if (gameOver) return; 

    if (currentBubble && currentBubble.active) { 
        currentBubble.x += currentBubble.vx; 
        currentBubble.y += currentBubble.vy; 

        if (currentBubble.x - BUBBLE_RADIUS <= 0 || currentBubble.x + BUBBLE_RADIUS >= canvas.width) { 
            currentBubble.vx *= -1; 
        } 

        if (currentBubble.y - BUBBLE_RADIUS <= 0 || checkGridCollision(currentBubble)) { 
            currentBubble.active = false; 
            snapToGrid(currentBubble); 
        } 
    } 
} 

function draw() { 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    for (let r = 0; r < ROWS; r++) { 
        for (let c = 0; c < COLS; c++) { 
            if (grid[r][c]) { 
                const bx = c * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS + (r % 2 * BUBBLE_RADIUS); 
                const by = r * (BUBBLE_RADIUS * 2) + BUBBLE_RADIUS; 
                drawCircle(bx, by, grid[r][c]); 
            } 
        } 
    } 

    if (!gameOver) {
        ctx.beginPath(); 
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; 
        ctx.setLineDash([5, 5]); 
        ctx.moveTo(shooterX, shooterY); 
        ctx.lineTo(mousePos.x, mousePos.y); 
        ctx.stroke(); 
        ctx.setLineDash([]); 
    }

    if (currentBubble && !gameOver) { 
        drawCircle(currentBubble.x, currentBubble.y, currentBubble.color); 
    } 

    if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
} 

function drawCircle(x, y, color) { 
    ctx.beginPath(); 
    ctx.arc(x, y, BUBBLE_RADIUS - 2, 0, Math.PI * 2); 
    ctx.fillStyle = color; 
    ctx.shadowColor = 'rgba(0,0,0,0.3)'; 
    ctx.shadowBlur = 4; 
    ctx.fill(); 
    ctx.closePath(); 
    ctx.shadowBlur = 0; 
} 

function loop() { 
    update(); 
    draw(); 
    requestAnimationFrame(loop); 
} 

initGrid(); 
spawnBubble(); 
checkAndStartGame(); 
loop(); 
</script> 
</body> 
</html>
