<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Tracking App</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f2027;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 { margin-bottom: 20px; }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .start { background: #00c853; color: white; }
    .stop { background: #d50000; color: white; }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    @media(max-width:600px){
      body { padding: 10px; }
      button { width: 100%; }
    }
  </style>
</head>

<body>

<h2>📍 Live Tracking</h2>

<button class="start" onclick="startTracking()">Start Tracking</button>
<button class="stop" onclick="stopTracking()">Stop Tracking</button>

<div class="card">
  <p>Latitude: <span id="lat">--</span></p>
  <p>Longitude: <span id="lng">--</span></p>
  <p>Last Update: <span id="time">--</span></p>
  <p>Status: <span id="status">Stopped</span></p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
  // 🔥 1. PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    
  apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
  authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
  databaseURL: "https://gemini-spinning-wheel-game-default-rtdb.firebaseio.com",
  projectId: "gemini-spinning-wheel-game",
  storageBucket: "gemini-spinning-wheel-game.firebasestorage.app",
  messagingSenderId: "691322332189",
  appId: "1:691322332189:web:e757b79d4d9eb010b692f4",
  measurementId: "G-PCXF32KFCG"

  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let watchId = null;
  let userId = "user_" + Math.floor(Math.random() * 10000);

  function startTracking() {
    document.getElementById("status").innerText = "Tracking...";

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;
        let time = new Date().toLocaleTimeString();

        // UI update
        document.getElementById("lat").innerText = lat;
        document.getElementById("lng").innerText = lng;
        document.getElementById("time").innerText = time;

        // Send to Firebase
        db.ref("users/" + userId).set({
          latitude: lat,
          longitude: lng,
          timestamp: Date.now()
        });
      },

      (err) => {
        alert("Error: " + err.message);
      },

      // 🔋 Battery optimization
      {
        enableHighAccuracy: false,
        maximumAge: 10000,
        timeout: 5000
      }
    );
  }

  function stopTracking() {
    navigator.geolocation.clearWatch(watchId);
    document.getElementById("status").innerText = "Stopped";
  }
</script>

</body>
</html>
