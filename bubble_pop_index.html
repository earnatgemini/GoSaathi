<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Bubble Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            background-color: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        #top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #334155;
            border-bottom: 4px solid #475569;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e293b;
            padding: 10px 25px;
            border-radius: 8px;
            min-width: 120px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #38bdf8;
        }

        #target-box .stat-value {
            color: #f43f5e;
        }

        #game-board {
            position: relative;
            width: 100%;
            height: 450px;
            background-color: #0f172a;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-content: flex-start;
            overflow-y: auto;
        }

        .bubble {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #38bdf8, #0284c7);
            box-shadow: inset -5px -5px 12px rgba(0,0,0,0.4), 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .bubble:hover {
            transform: scale(1.1);
        }

        .bubble:active {
            transform: scale(0.9);
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #f43f5e;
        }

        #overlay p {
            font-size: 20px;
            margin-bottom: 30px;
            color: #94a3b8;
        }

        .btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Top Status Bar -->
        <div id="top-panel">
           
            <div class="stat-box">
                <span class="stat-label">Timer</span>
                <span class="stat-value" id="timer-val">60</span>
            </div>
             <div class="stat-box" id="target-box">
                <span class="stat-label">Hit Target</span>
                <span class="stat-value" id="target-val">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score-val">0</span>
            </div>
        </div>

        <!-- Main Gameplay Arena -->
        <div id="game-board">
            <div id="overlay">
                <h1 id="overlay-title">Bubble Pop!</h1>
                <p id="overlay-desc">Click bubbles matching the Hit Target number to score.</p>
                <button class="btn" id="start-btn" onclick="startGame()">Start Game</button>
                 <a href="about.html">X</a>
            </div>
        </div>
    </div>

    <script>
        let timer = 60;
        let score = 0;
        let currentTarget = 0;
        let timerInterval = null;

        const board = document.getElementById('game-board');
        const targetDisplay = document.getElementById('target-val');
        const timerDisplay = document.getElementById('timer-val');
        const scoreDisplay = document.getElementById('score-val');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const startBtn = document.getElementById('start-btn');

        // Linear interpolation for vibrant bubble colors based on values 1-9
        const colors = [
            '#ef4444', '#f97316', '#f59e0b', '#eab308', 
            '#84cc16', '#22c55e', '#06b6d4', '#3b82f6', '#a855f7'
        ];

        function createBubbles() {
            // Remove existing bubbles but keep the overlay if it is visible
            const bubbles = board.querySelectorAll('.bubble');
            bubbles.forEach(b => b.remove());

            // Generate an optimized grid of bubbles depending on container bounds
            for (let i = 0; i < 60; i++) {
                const randomNum = Math.floor(Math.random() * 9) + 1; 
                const bubble = document.createElement('div');
                
                bubble.classList.add('bubble');
                bubble.textContent = randomNum;
                
                // Give different numbers uniquely recognizable gradient profiles
                const mainColor = colors[randomNum - 1];
                bubble.style.background = `radial-gradient(circle at 30% 30%, ${mainColor}ac, ${mainColor})`;

                board.appendChild(bubble);
            }
        }

        function generateNewTarget() {
            currentTarget = Math.floor(Math.random() * 9) + 1;
            targetDisplay.textContent = currentTarget;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timer > 0) {
                    timer--;
                    timerDisplay.textContent = timer;
                } else {
                    endGame();
                }
            }, 1000);
        }

        // Single Event Listener using Event Delegation for efficiency
        board.addEventListener('click', (event) => {
            if (event.target.classList.contains('bubble')) {
                const clickedNumber = parseInt(event.target.textContent);
                
                if (clickedNumber === currentTarget) {
                    score += 10;
                    scoreDisplay.textContent = score;
                    generateNewTarget();
                    createBubbles();
                } else {
                    // Slight penalty deduction for missing the target number
                    score = Math.max(0, score - 5);
                    scoreDisplay.textContent = score;
                }
            }
        });

        function startGame() {
            // Reset state
            score = 0;
            timer = 60;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timer;
            
            overlay.style.display = 'none';
            
            generateNewTarget();
            createBubbles();
            startTimer();
        }

        function endGame() {
            clearInterval(timerInterval);
            
            overlayTitle.textContent = "Game Over!";
            overlayDesc.textContent = `You scored ${score} points.`;
            startBtn.textContent = "Play Again";
            
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
