<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSaathi - Share Together Save Together</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #007bff; --secondary: #28a745; --dark: #1e3c72; --gold: #ffcc00; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f4f7f6; color: #333; padding-bottom: 70px; }
        .header { background: linear-gradient(135deg, var(--dark), #2a5298); color:white; padding:20px; text-align:center; }
        .nav { display:flex; justify-content:space-around; background:white; padding:12px; position:fixed; bottom:0; width:100%; z-index:100; border-top:1px solid #ddd; }
        .nav button { background:none; border:none; font-weight:bold; color: var(--dark); cursor:pointer; }
        .container { padding:15px; max-width: 500px; margin: auto; }
        .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
        .wallet-card { background: var(--dark); color: white; text-align: center; }
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color:white; border:none; font-weight:bold; cursor:pointer; }
        .ride-item { border-left: 5px solid var(--primary); padding: 10px; margin-bottom: 10px; background: #fff; border-radius: 10px; }
        table { width:100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="main-ui" style="display:none;">
    <div class="header">
        <img src="logo.png" alt="Gosaathi" style="height:50px;">
        <h1>GoSaathi</h1>
        <p>భారతదేశం అంతటా సురక్షిత ప్రయాణం</p>
    </div>
    <div class="nav">
        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('ride')">🚗 Post</button>
        <button onclick="showPage('my-rides')">📅 My Rides</button>
        <button onclick="showPage('wallet')">💰 Wallet</button>
        <button onclick="showPage('profile')">👥 Profile</button>
    </div>
</div>

<div class="container">
    <div id="login-screen" style="text-align:center; margin-top:100px;">
        <img src="logo.png" style="height:80px; margin-bottom:20px;"><br>
        <h2>Welcome to Gosaathi</h2>
        <button onclick="googleLogin()" style="background:#db4437; padding:15px;">Google తో లాగిన్ అవ్వండి</button>
    </div>

    <div id="basic-info-screen" style="display:none;">
        <div class="card">
            <h3>Basic Information</h3>
            <input type="text" id="userPhone" placeholder="Mobile Number">
            <input type="text" id="userVillage" placeholder="Village / City">
            <select id="userGender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <p><input type="checkbox" id="tcCheck" style="width:auto;"> I accept Terms & Conditions</p>
            <button onclick="submitBasicInfo()">Save & Continue</button>
        </div>
    </div>

    <div id="activation-screen" style="display:none;">
        <div class="card">
            <h2 style="color:var(--primary);">Account Activation</h2>
            <p>మీ అకౌంట్ ఇంకా యాక్టివేట్ కాలేదు.</p>
            <input type="text" id="manualInviteCode" placeholder="Enter Invite Code">
            <button onclick="activateByCode()" style="background:var(--secondary);">యాక్టివేట్ చేయండి</button>
            <hr>
            <button onclick="showPage('wallet')">Option 2: Pay ₹1200 for 1 Lakh Coins</button>
        </div>
    </div>

    <div id="home" style="display:none;">
        <h3>Available Rides (Live)</h3>
        <div id="ridesContainer">రైడ్స్ లోడ్ అవుతున్నాయి...</div>
    </div>

    <div id="wallet" style="display:none;">
        <div class="card wallet-card">
            <h3>My Balance</h3>
            <h2 id="coinBalance">0</h2>
            <p>Coins</p>
        </div>
        </div>

    <div id="ride" style="display:none;">
        <div class="card">
            <h3>Post a New Ride</h3>
            <input id="from" placeholder="From City">
            <input id="to" placeholder="To City">
            <select id="rideType">
                <option value="Free">Free Ride</option>
                <option value="Paid">Paid Ride</option>
            </select>
            <div id="paidExtraFields" style="display:none;">
                <input type="number" id="demandPrice" placeholder="అడిగే కాయిన్స్">
            </div>
            <input type="datetime-local" id="rideTime">
            <button onclick="postRide()">Post Ride</button>
        </div>
    </div>

    <div id="my-rides" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="btnHostTab" onclick="loadMyRides('host')" style="flex:1;">As Host</button>
            <button id="btnGuestTab" onclick="loadMyRides('co-saathi')" style="flex:1;">As Co-Saathi</button>
        </div>
        <div id="myRidesList"></div>
    </div>

    <div id="profile" style="display:none;">
        <div class="card">
            <p>Your UID: <code id="myUidDisplay"></code></p>
            <button onclick="auth.signOut()">Logout</button>
        </div>
    </div>
</div>

<div id="joinModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; padding:20px; border-radius:15px;">
        <h3 id="modalTitle">Ride Request</h3>
        <p id="modalBody" style="margin-bottom:15px;"></p>
        
        <div id="pickupArea" style="display:none; margin-bottom:15px; text-align:left;">
            <label>📍 మీ పికప్ పాయింట్ (Pickup Point):</label>
            <input type="text" id="pickupPoint" placeholder="ఉదా: కేపీహెచ్‌బీ మెయిన్ రోడ్">
        </div>

        <div id="bargainArea" style="display:none; margin-bottom:15px; text-align:left;">
            <label>💰 మీ ఆఫర్ (Your Offer):</label>
            <input type="number" id="customOffer" placeholder="Coins లో ఎంటర్ చేయండి">
        </div>

        <div id="initialButtons" style="display:flex; flex-direction:column; gap:10px;">
            <button id="btnOk" style="background:var(--secondary);">OK (Demand OK)</button>
            <button id="btnBargain" style="background:var(--gold); color:black;">Bargain</button>
            <button onclick="closeJoinModal()" style="background:#666;">Cancel</button>
        </div>

        <button id="btnFinalSubmit" style="display:none; background:var(--primary); width:100%; margin-top:10px;">Confirm Request</button>
    </div>
</div>

<script>
// --- Configuration ---
const firebaseConfig = { 
    apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY", 
    authDomain: "gemini-spinning-wheel-game.firebaseapp.com", 
    projectId: "gemini-spinning-wheel-game" 
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const ADMIN_UID = "JiHQO3M0UUdftGqDPUKBwxPqv9q1";

// --- Global States ---
let currentRideId = null;
let currentRideData = null;
let tempOffer = 0;

// --- Auth ---
function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('myUidDisplay').innerText = user.uid;
        checkUserStatus(user);
    } else {
        document.getElementById('main-ui').style.display = 'none';
        showPage('login-screen');
    }
});

function checkUserStatus(user) {
    db.collection("Users").doc(user.uid).onSnapshot(doc => {
        if (doc.exists) {
            const data = doc.data();
            if (!data.phone) showPage('basic-info-screen');
            else if (data.membership === "Active") {
                document.getElementById('coinBalance').innerText = data.coins || 0;
                showPage('home');
            } else showPage('activation-screen');
        } else {
            db.collection("Users").doc(user.uid).set({
                name: user.displayName, email: user.email, coins: 0, membership: "Active", joinDate: Date.now()
            });
        }
    });
}

// --- Navigation ---
function showPage(pageId) {
    const pages = ['home', 'wallet', 'ride', 'profile', 'activation-screen', 'login-screen', 'basic-info-screen', 'my-rides'];
    pages.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = (id === pageId) ? 'block' : 'none';
    });
    if(pageId === 'home') loadRides();
    if(pageId === 'my-rides') loadMyRides('host');
}

// --- Ride Functions ---
async function postRide() {
    const from = document.getElementById('from').value;
    const to = document.getElementById('to').value;
    const type = document.getElementById('rideType').value;
    const time = document.getElementById('rideTime').value;
    const demand = (type === "Paid") ? Number(document.getElementById('demandPrice').value) : 0;

    if(!from || !to || !time) return alert("Details fill cheyandi!");

    await db.collection("Rides").add({
        saathiId: auth.currentUser.uid, saathiName: auth.currentUser.displayName,
        from, to, type, time, demand, status: "Available", createdAt: Date.now()
    });
    alert("Ride Posted!");
    showPage('home');
}

function loadRides() {
    db.collection("Rides").where("status", "==", "Available").onSnapshot(snap => {
        const container = document.getElementById('ridesContainer');
        container.innerHTML = "";
        snap.forEach(doc => {
            const r = doc.data();
            if(r.saathiId === auth.currentUser.uid) return;
            container.innerHTML += `
                <div class="card ride-item">
                    <b>${r.from} ➔ ${r.to}</b> (${r.type})<br>
                    💰 Demand: ${r.demand} Coins<br>
                    <button onclick="initiateJoin('${doc.id}', '${r.type}')" style="background:var(--secondary);">Join Ride</button>
                </div>`;
        });
    });
}

// --- Join Request Logic ---
async function initiateJoin(rideId, rideType) {
    const rideDoc = await db.collection("Rides").doc(rideId).get();
    const rData = rideDoc.data();
    currentRideId = rideId;
    currentRideData = rData;
    currentRideData.rideType = rideType;
    currentRideData.commToPay = (rideType === "Paid") ? 40 : 500;

    document.getElementById('modalBody').innerHTML = `హోస్ట్ డిమాండ్: <b>${rData.demand} Coins</b>`;
    document.getElementById('joinModal').style.display = 'flex';
    document.getElementById('pickupArea').style.display = 'none';
    document.getElementById('bargainArea').style.display = 'none';
    document.getElementById('initialButtons').style.display = 'flex';
    document.getElementById('btnFinalSubmit').style.display = 'none';

    document.getElementById('btnOk').onclick = () => { tempOffer = rData.demand; showPickupStep(); };
    document.getElementById('btnBargain').onclick = () => { tempOffer = 0; document.getElementById('bargainArea').style.display = 'block'; showPickupStep(); };
}

function showPickupStep() {
    document.getElementById('initialButtons').style.display = 'none';
    document.getElementById('pickupArea').style.display = 'block';
    document.getElementById('btnFinalSubmit').style.display = 'block';
}

document.getElementById('btnFinalSubmit').onclick = async () => {
    const pickup = document.getElementById('pickupPoint').value;
    const bargainVal = document.getElementById('customOffer').value;
    const finalOffer = bargainVal ? Number(bargainVal) : tempOffer;

    if(!pickup) return alert("Pickup point enters cheyandi!");
    
    await db.collection("Requests").add({
        rideId: currentRideId, hostId: currentRideData.saathiId,
        coSaathiId: auth.currentUser.uid, coSaathiName: auth.currentUser.displayName,
        from: currentRideData.from, to: currentRideData.to,
        offerPrice: finalOffer, pickupPoint: pickup, status: "Pending",
        rideType: currentRideData.rideType, commToPay: currentRideData.commToPay, createdAt: Date.now()
    });
    alert("Request Sent!");
    closeJoinModal();
};

function closeJoinModal() { document.getElementById('joinModal').style.display = 'none'; }

// --- My Rides & Coin Transfer ---
async function loadMyRides(role) {
    const list = document.getElementById('myRidesList');
    list.innerHTML = "Loading...";
    const queryField = (role === 'host') ? "hostId" : "coSaathiId";
    
    db.collection("Requests").where(queryField, "==", auth.currentUser.uid).onSnapshot(snap => {
        list.innerHTML = "";
        snap.forEach(doc => {
            const r = doc.data();
            list.innerHTML += `
                <div class="card">
                    <b>${r.from} ➔ ${r.to}</b> [${r.status}]<br>
                    Offer: ${r.offerPrice} | Pickup: ${r.pickupPoint}<br>
                    ${role === 'host' && r.status === 'Pending' ? `<button onclick="respondRequest('${doc.id}', '${r.rideId}', 'Confirmed')">Confirm</button>` : ''}
                    ${role === 'host' && r.status === 'Confirmed' ? `<button onclick="startJourney('${doc.id}')">Start Journey</button>` : ''}
                    ${role === 'co-saathi' && r.status === 'Journey Started' ? `<button onclick="joinSaathi('${doc.id}', '${r.hostId}', ${r.offerPrice}, ${r.commToPay})">Join Saathi (Pay)</button>` : ''}
                </div>`;
        });
    });
}

async function respondRequest(reqId, rideId, status) {
    const batch = db.batch();
    batch.update(db.collection("Requests").doc(reqId), { status });
    if(status === 'Confirmed') batch.update(db.collection("Rides").doc(rideId), { status: "GoSaathi" });
    await batch.commit();
}

async function startJourney(reqId) { await db.collection("Requests").doc(reqId).update({ status: "Journey Started" }); }

async function joinSaathi(reqId, hostId, price, comm) {
    const batch = db.batch();
    const coRef = db.collection("Users").doc(auth.currentUser.uid);
    const hostRef = db.collection("Users").doc(hostId);
    
    batch.update(coRef, { coins: firebase.firestore.FieldValue.increment(-(price + comm)) });
    batch.update(hostRef, { coins: firebase.firestore.FieldValue.increment(price) });
    batch.update(db.collection("Requests").doc(reqId), { status: "Joined" });
    
    await batch.commit();
    alert("Transaction Successful!");
}

document.getElementById('rideType').addEventListener('change', function() {
    document.getElementById('paidExtraFields').style.display = (this.value === 'Paid') ? 'block' : 'none';
});
</script>
</body>
</html>
