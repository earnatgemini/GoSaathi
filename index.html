<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSaathi - Share Together Save Together</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #007bff; --secondary: #28a745; --dark: #1e3c72; --gold: #ffcc00; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f4f7f6; color: #333; padding-bottom: 70px; }
        .header { background: linear-gradient(135deg, var(--dark), #2a5298); color:white; padding:20px; text-align:center; }
        .nav { display:flex; justify-content:space-around; background:white; padding:12px; position:fixed; bottom:0; width:100%; z-index:100; border-top:1px solid #ddd; }
        .nav button { background:none; border:none; font-weight:bold; color: var(--dark); cursor:pointer; }
        .container { padding:15px; max-width: 500px; margin: auto; }
        .card { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
        .wallet-card { background: var(--dark); color: white; text-align: center; }
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color:white; border:none; font-weight:bold; cursor:pointer; }
        .ride-item { border-left: 5px solid var(--primary); padding: 10px; margin-bottom: 10px; background: #fff; border-radius: 10px; }
    </style>
</head>
<body>

<div id="main-ui" style="display:none;">
    <div class="header">
        <img src="logo.png" alt="Gosaathi" style="height:50px;">
        <h1>GoSaathi</h1>
        <p>భారతదేశం అంతటా సురక్షిత ప్రయాణం</p>
    </div>
    <div class="nav">
        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('ride')">🚗 Post</button>
        <button onclick="showPage('my-rides')">🚗 My Rides</button>
        <button onclick="showPage('wallet')">💰 Wallet</button>
        <button onclick="showPage('profile')">👥 Profile</button>
    </div>
</div>

<div class="container">
    <div id="login-screen" style="text-align:center; margin-top:100px;">
        <img src="logo.png" style="height:80px; margin-bottom:20px;"><br>
        <h2>Welcome to Gosaathi</h2>
        <button onclick="googleLogin()" style="background:#db4437; padding:15px;">Google తో లాగిన్ అవ్వండి</button>
    </div>

    <div id="basic-info-screen" style="display:none;">
        <div class="card">
            <h3>Basic Information</h3>
            <input type="text" id="userPhone" placeholder="Mobile Number">
            <input type="text" id="userVillage" placeholder="Village / City">
            <select id="userGender">
                <option value="">Select Your Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
            <p><input type="checkbox" id="tcCheck" style="width:auto;"> I accept Terms & Conditions</p>
            <button onclick="submitBasicInfo()">Save & Continue</button>
        </div>
    </div>

    <div id="home" style="display:none;">
        <h3>Available Rides (Live)</h3>
        <div id="ridesContainer">రైడ్స్ లోడ్ అవుతున్నాయి...</div>
    </div>

    <div id="ride" style="display:none;">
        <div class="card">
            <h3>Post a New Ride</h3>
            <input id="from" placeholder="From City">
            <input id="to" placeholder="To City">
            <input id="viaRoute" placeholder="Via (Route) - ఏ ఊర్ల మీదుగా?">
            <select id="genderPreference">
                <option value="All">ఎవరైనా జాయిన్ అవ్వచ్చు (All)</option>
                <option value="Male Only">కేవలం అబ్బాయిలు (Male Only)</option>
                <option value="Female Only">కేవలం అమ్మాయిలు (Female Only)</option>
            </select>
            <select id="rideType">
                <option value="Free">Free Ride</option>
                <option value="Paid">Paid Ride</option>
            </select>
            <div id="paidExtraFields" style="display:none;">
                <input type="number" id="demandPrice" placeholder="అడిగే కాయిన్స్">
            </div>
            <input type="datetime-local" id="rideTime">
            <button onclick="postRide()">Post Ride</button>
        </div>
    </div>

    <div id="my-rides" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="btnHostTab" onclick="loadMyRides('host')" style="flex:1;">As Host</button>
            <button id="btnGuestTab" onclick="loadMyRides('co-saathi')" style="flex:1;">As Co-Saathi</button>
        </div>
        <div id="myRidesList"></div>
    </div>

    <div id="wallet" style="display:none;">
        <div class="card wallet-card">
            <h2 id="coinBalance">0</h2>
            <p>Coins Balance</p>
        </div>
    </div>

    <div id="profile" style="display:none;">
        <div class="card">
            <p>Your UID: <code id="myUidDisplay"></code></p>
            <button onclick="auth.signOut()">Logout</button>
        </div>
    </div>
</div>

<div id="joinModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-width:400px; padding:20px; border-radius:15px;">
        <h3 id="modalTitle">Ride Request</h3>
        <p id="modalBody"></p>
        <div id="pickupArea" style="display:none;">
            <input type="text" id="pickupPoint" placeholder="📍 మీ పికప్ పాయింట్">
        </div>
        <div id="bargainArea" style="display:none;">
            <input type="number" id="customOffer" placeholder="💰 మీ ఆఫర్ (Coins)">
        </div>
        <div id="initialButtons">
            <button id="btnOk" style="background:var(--secondary);">OK</button>
            <button id="btnBargain" style="background:var(--gold); color:black;">Bargain</button>
        </div>
        <button id="btnFinalSubmit" style="display:none; margin-top:10px;">Confirm Request</button>
        <button onclick="closeJoinModal()" style="background:#666; margin-top:10px;">Cancel</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY", authDomain: "gemini-spinning-wheel-game.firebaseapp.com", projectId: "gemini-spinning-wheel-game" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function googleLogin() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('myUidDisplay').innerText = user.uid;
        checkUserStatus(user);
    } else {
        document.getElementById('main-ui').style.display = 'none';
        showPage('login-screen');
    }
});

function checkUserStatus(user) {
    db.collection("Users").doc(user.uid).onSnapshot(doc => {
        if (doc.exists) {
            const data = doc.data();
            if (!data.phone) showPage('basic-info-screen');
            else {
                document.getElementById('coinBalance').innerText = data.coins || 0;
                showPage('home');
            }
        } else {
            db.collection("Users").doc(user.uid).set({ name: user.displayName, email: user.email, coins: 0, joinDate: Date.now() });
        }
    });
}

function submitBasicInfo() {
    const phone = document.getElementById('userPhone').value;
    const gender = document.getElementById('userGender').value;
    if(!phone || !gender) return alert("Fill all details!");
    db.collection("Users").doc(auth.currentUser.uid).update({ phone, gender });
}

function showPage(pageId) {
    ['home', 'wallet', 'ride', 'profile', 'login-screen', 'basic-info-screen', 'my-rides'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = (id === pageId) ? 'block' : 'none';
    });
    if(pageId === 'home') loadRides();
    if(pageId === 'my-rides') loadMyRides('host');
}

async function postRide() {
    const from = document.getElementById('from').value;
    const to = document.getElementById('to').value;
    const via = document.getElementById('viaRoute').value;
    const pref = document.getElementById('genderPreference').value;
    const type = document.getElementById('rideType').value;
    const time = document.getElementById('rideTime').value;
    const demand = (type === "Paid") ? Number(document.getElementById('demandPrice').value) : 0;

    if(!from || !to || !time) return alert("Details fill cheyandi!");

    await db.collection("Rides").add({
        saathiId: auth.currentUser.uid, saathiName: auth.currentUser.displayName,
        from, to, via, preference: pref, type, time, demand, status: "Available", createdAt: Date.now()
    });
    alert("Ride Posted!");
    showPage('home');
}

async function loadRides() {
    const userDoc = await db.collection("Users").doc(auth.currentUser.uid).get();
    const myGender = userDoc.data().gender;

    db.collection("Rides").where("status", "==", "Available").onSnapshot(snap => {
        const container = document.getElementById('ridesContainer');
        container.innerHTML = "";
        snap.forEach(doc => {
            const r = doc.data();
            let show = (r.preference === "All") || (r.preference === "Male Only" && myGender === "Male") || (r.preference === "Female Only" && myGender === "Female");
            if (show && r.saathiId !== auth.currentUser.uid) {
                container.innerHTML += `<div class="card ride-item">
                    <b>${r.from} ➔ ${r.to}</b><br>🛣️ Via: ${r.via || 'Direct'}<br>💰 ${r.demand} Coins<br>
                    <button onclick="initiateJoin('${doc.id}', '${r.type}')" style="background:var(--secondary);">Join Ride</button>
                </div>`;
            }
        });
    });
}

let currentRideId, currentRideData, tempOffer;
async function initiateJoin(rideId, rideType) {
    const rideDoc = await db.collection("Rides").doc(rideId).get();
    currentRideId = rideId; currentRideData = rideDoc.data();
    currentRideData.commToPay = (rideType === "Paid") ? 40 : 500;

    document.getElementById('modalBody').innerHTML = `Route: ${currentRideData.via || 'Direct'}<br>Demand: ${currentRideData.demand} Coins`;
    document.getElementById('joinModal').style.display = 'flex';
    document.getElementById('pickupArea').style.display = 'none';
    document.getElementById('bargainArea').style.display = 'none';
    document.getElementById('initialButtons').style.display = 'flex';
    document.getElementById('btnFinalSubmit').style.display = 'none';

    document.getElementById('btnOk').onclick = () => { tempOffer = currentRideData.demand; showPickupStep(); };
    document.getElementById('btnBargain').onclick = () => { tempOffer = 0; document.getElementById('bargainArea').style.display = 'block'; showPickupStep(); };
}

function showPickupStep() {
    document.getElementById('initialButtons').style.display = 'none';
    document.getElementById('pickupArea').style.display = 'block';
    document.getElementById('btnFinalSubmit').style.display = 'block';
}

document.getElementById('btnFinalSubmit').onclick = async () => {
    const pickup = document.getElementById('pickupPoint').value;
    const finalOffer = document.getElementById('customOffer').value || tempOffer;
    if(!pickup) return alert("Pickup point enters cheyandi!");
    await db.collection("Requests").add({
        rideId: currentRideId, hostId: currentRideData.saathiId, coSaathiId: auth.currentUser.uid,
        coSaathiName: auth.currentUser.displayName, from: currentRideData.from, to: currentRideData.to,
        offerPrice: Number(finalOffer), pickupPoint: pickup, status: "Pending",
        commToPay: currentRideData.commToPay, createdAt: Date.now()
    });
    alert("Request Sent!"); closeJoinModal();
};

function closeJoinModal() { document.getElementById('joinModal').style.display = 'none'; }

async function loadMyRides(role) {
    const list = document.getElementById('myRidesList');
    list.innerHTML = "Loading...";
    const field = (role === 'host') ? "hostId" : "coSaathiId";
    db.collection("Requests").where(field, "==", auth.currentUser.uid).onSnapshot(snap => {
        list.innerHTML = "";
        snap.forEach(doc => {
            const r = doc.data();
            list.innerHTML += `<div class="card"><b>${r.from} ➔ ${r.to}</b> [${r.status}]<br>Offer: ${r.offerPrice} | Pickup: ${r.pickupPoint}</div>`;
        });
    });
}

document.getElementById('rideType').addEventListener('change', function() {
    document.getElementById('paidExtraFields').style.display = (this.value === 'Paid') ? 'block' : 'none';
});
</script>
</body>
</html>
