<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSaathi - Share Together Save Together</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #007bff; --secondary: #28a745; --dark: #1e3c72; --gold: #ffcc00; }
        body { margin:0; font-family: 'Segoe UI', sans-serif; background:#f4f7f6; color: #333; padding-bottom: 70px; }
        .header { background: linear-gradient(135deg, var(--dark), #2a5298); color:white; padding:20px; text-align:center; }
        .nav { display:flex; justify-content:space-around; background:white; padding:12px; position:fixed; bottom:0; width:100%; z-index:100; border-top:1px solid #ddd; }
        .btn { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-weight:600; margin:5px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color:white; }
        .btn-success { background: var(--secondary); color:white; }
        .card { background:white; margin:15px; padding:15px; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); }
        .ride-active { border-left: 5px solid var(--gold); background: #fffdf0; }
        .chat-box { font-size: 0.9em; color: #555; margin-top: 10px; padding: 5px; background: #eee; border-radius: 5px; }
        input, select { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
        #loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; z-index:1000; }
    </style>
</head>
<body>

<div id="loading-screen"><h3>GoSaathi Loading...</h3></div>

<div class="header">
    <h1>GoSaathi</h1>
    <div id="user-info"></div>
</div>

<div id="home" class="page" style="display:none;">
    <div id="active-rides-section"></div>
    <h3>Available Rides</h3>
    <div id="ride-list"></div>
</div>

<div id="basic-info-screen" class="page" style="display:none; padding:20px;">
    <h2>Welcome to GoSaathi</h2>
    <p id="joining-msg"></p>
    <input type="text" id="user-name" placeholder="మీ పూర్తి పేరు">
    <input type="text" id="user-phone" placeholder="ఫోన్ నంబర్">
    <div id="payment-section" style="display:none;">
        <p style="color:red;">మీరు ఇన్విటేషన్ లేకుండా చేరుతున్నారు, కాబట్టి ₹1200 పేమెంట్ చేయాలి.</p>
        <button class="btn btn-primary" onclick="simulatePayment()">Pay ₹1200 & Activate</button>
    </div>
    <button id="save-info-btn" class="btn btn-success" style="display:none;" onclick="saveBasicInfo()">Activate Account</button>
</div>

<div class="nav" id="main-nav" style="display:none;">
    <button onclick="showPage('home')">🏠 Home</button>
    <button onclick="showPage('ride')">🚗 Offer Ride</button>
    <button onclick="showPage('wallet')">💰 Wallet</button>
    <button onclick="showPage('profile')">👤 Profile</button>
</div>

<script>
// Firebase Configuration (Replace with your keys)
const firebaseConfig = {
    apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY",
    authDomain: "gemini-spinning-wheel-game.firebaseapp.com",
    projectId: "gemini-spinning-wheel-game",
    storageBucket: "gemini-spinning-wheel-game.firebasestorage.app",
    messagingSenderId: "691322332189",
    appId: "1:691322332189:web:e757b79d4d9eb010b692f4"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUserData = null;

// Auth Logic & Network Protection
auth.onAuthStateChanged(async (user) => {
    document.getElementById('loading-screen').style.display = 'none';
    if (user) {
        try {
            const userDoc = await db.collection("Users").doc(user.uid).get();
            if (userDoc.exists) {
                // పాత యూజర్ - నేరుగా హోమ్ కి వెళ్తారు
                currentUserData = userDoc.data();
                if (currentUserData.isActive) {
                    showPage('home');
                } else {
                    showPage('basic-info-screen');
                    checkInvitation();
                }
            } else {
                // కొత్త యూజర్
                showPage('basic-info-screen');
                checkInvitation();
            }
        } catch (error) {
            console.error("Network Error:", error);
            alert("నెట్వర్క్ కనెక్షన్ సరిగా లేదు. దయచేసి మళ్ళీ ప్రయత్నించండి.");
        }
    } else {
        // Login Logic here (simulated)
        auth.signInAnonymously(); 
    }
});

// Invitation & Joining Logic
function checkInvitation() {
    const urlParams = new URLSearchParams(window.location.search);
    const inviteId = urlParams.get('invite');
    const msgEl = document.getElementById('joining-msg');
    
    if (inviteId) {
        msgEl.innerText = "మీరు ఇన్విటేషన్ ద్వారా జాయిన్ అయ్యారు! మీకు 500 కాయిన్స్ గిఫ్ట్ గా లభిస్తాయి.";
        document.getElementById('save-info-btn').style.display = 'block';
    } else {
        msgEl.innerText = "మీరు డైరెక్ట్ గా జాయిన్ అవుతున్నారు.";
        document.getElementById('payment-section').style.display = 'block';
    }
}

function simulatePayment() {
    alert("Payment Successful! ₹1200 Received.");
    document.getElementById('payment-section').style.display = 'none';
    document.getElementById('save-info-btn').style.display = 'block';
}

async function saveBasicInfo() {
    const name = document.getElementById('user-name').value;
    const phone = document.getElementById('user-phone').value;
    const urlParams = new URLSearchParams(window.location.search);
    const inviteId = urlParams.get('invite');

    if (!name || !phone) return alert("వివరాలు నింపండి");

    let coins = inviteId ? 500 : 100000;

    await db.collection("Users").doc(auth.currentUser.uid).set({
        name, phone, coins, isActive: true, uid: auth.currentUser.uid
    });
    location.reload();
}

// Ride Flow Logic
async function loadRides() {
    const rideList = document.getElementById('ride-list');
    const activeSection = document.getElementById('active-rides-section');
    rideList.innerHTML = "";
    activeSection.innerHTML = "";

    const snapshot = await db.collection("Rides").get();
    snapshot.forEach(doc => {
        const ride = doc.data();
        const isHost = ride.hostUid === auth.currentUser.uid;
        const isParticipant = ride.participantUid === auth.currentUser.uid;

        // 1. హోమ్ పేజీలో అందరికీ కనిపించే రైడ్స్ (కేవలం Open వి మాత్రమే)
        if (ride.status === 'Open' && !isHost) {
            rideList.innerHTML += `
                <div class="card">
                    <h4>${ride.from} to ${ride.to}</h4>
                    <p>Coins: ${ride.amount}</p>
                    <button class="btn btn-primary" onclick="requestRide('${doc.id}')">Request Ride</button>
                </div>`;
        }

        // 2. Active Rides & Chats Section
        // 'Joined' లేదా 'Completed' అయితే ఇక్కడ నుండి మాయం అవుతుంది
        if ((isHost || isParticipant) && (ride.status === 'Accepted' || ride.status === 'Journey Started' || ride.status === 'Joined')) {
            
            // యూజర్ అడిగిన ప్రకారం 'Joined' స్టేటస్ వచ్చాక ఆటోమేటిక్ గా డిసప్పియర్ అవ్వాలి.
            // కానీ 'Complete Ride' బటన్ నొక్కాలి కాబట్టి 'Joined' వరకు ఉంచి, 'Completed' అయ్యాక తీసేస్తున్నాము.
            if (ride.status === 'Completed') return;

            activeSection.innerHTML += `
                <div class="card ride-active">
                    <span class="badge">Active Ride: ${ride.status}</span>
                    <h4>Ride to ${ride.to}</h4>
                    <div id="controls-${doc.id}">
                        ${getRideControls(doc.id, ride, isHost)}
                    </div>
                </div>`;
        }
    });
}

function getRideControls(rideId, ride, isHost) {
    if (isHost) {
        if (ride.status === 'Accepted') {
            return `<button class="btn btn-primary" onclick="updateStatus('${rideId}', 'Journey Started')">Start Journey</button>`;
        }
        if (ride.status === 'Journey Started') {
            return `<p>Waiting for Co-Saathi to join...</p>`;
        }
        if (ride.status === 'Joined') {
            return `<p>Journey in Progress...</p>`;
        }
    } else {
        if (ride.status === 'Journey Started') {
            return `<button class="btn btn-success" onclick="joinSaathi('${rideId}', ${ride.amount})">Join Saathi (Pay Coins)</button>`;
        }
        if (ride.status === 'Joined') {
            return `<button class="btn btn-gold" style="background:orange; color:white;" onclick="completeRide('${rideId}')">Complete Ride</button>`;
        }
    }
    return '';
}

// Actions
async function updateStatus(rideId, newStatus) {
    await db.collection("Rides").doc(rideId).update({ status: newStatus });
    loadRides();
}

async function joinSaathi(rideId, amount) {
    const userRef = db.collection("Users").doc(auth.currentUser.uid);
    const rideRef = db.collection("Rides").doc(rideId);

    try {
        await db.runTransaction(async (transaction) => {
            const userDoc = await transaction.get(userRef);
            if (userDoc.data().coins < amount) throw "తక్కువ కాయిన్స్ ఉన్నాయి!";

            transaction.update(userRef, { coins: firebase.firestore.FieldValue.increment(-amount) });
            transaction.update(rideRef, { status: "Joined" });
        });
        alert("Joined! కాయిన్స్ కట్ అయ్యాయి.");
        loadRides();
    } catch (e) { alert(e); }
}

async function completeRide(rideId) {
    const rideRef = db.collection("Rides").doc(rideId);
    const rideDoc = await rideRef.get();
    const hostRef = db.collection("Users").doc(rideDoc.data().hostUid);

    await db.runTransaction(async (transaction) => {
        transaction.update(hostRef, { coins: firebase.firestore.FieldValue.increment(rideDoc.data().amount) });
        transaction.update(rideRef, { status: "Completed" });
    });
    alert("Ride Completed! కాయిన్స్ హోస్ట్ కి బదిలీ అయ్యాయి.");
    loadRides(); // 'Completed' కాబట్టి ఇప్పుడు మాయం అవుతుంది
}

async function requestRide(rideId) {
    await db.collection("Rides").doc(rideId).update({
        status: 'Accepted', // Host accept చేసినట్లుగా ఇక్కడ సిమ్యులేట్ చేస్తున్నాం
        participantUid: auth.currentUser.uid
    });
    loadRides();
}

function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(pageId).style.display = 'block';
    document.getElementById('main-nav').style.display = (pageId === 'basic-info-screen') ? 'none' : 'flex';
    if(pageId === 'home') loadRides();
}
</script>
</body>
</html>
