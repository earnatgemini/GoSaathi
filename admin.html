<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gosaathi Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2a2a2a; padding: 15px; border-radius: 10px; border: 1px solid #444; margin-bottom: 10px; }
        button { cursor: pointer; padding: 10px; border-radius: 5px; border: none; font-weight: bold; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>🚀 Gosaathi Admin Control</h1>
    <div id="login-section">
        <button onclick="adminLogin()" style="background:#007bff; color:white; padding:15px;">Login as Admin</button>
    </div>
    
    <div id="admin-content" style="display:none;">
        <h3>Pending Payments</h3>
        <div id="pendingList">Loading...</div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyD1P5PoYl467FXxaaWFaCGHWuZs1yUMGwY", authDomain: "gemini-spinning-wheel-game.firebaseapp.com", projectId: "gemini-spinning-wheel-game" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function adminLogin() {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

auth.onAuthStateChanged(user => {
    if (user && user.uid === '1133Ef1W75OuDPVh7NviELeUGLt1') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadAdminData();
    } else if (user) {
        alert("Access Denied! You are not an admin.");
        auth.signOut();
    }
});

function loadAdminData() {
    db.collection("Payments").where("status", "==", "Pending").onSnapshot(snap => {
        const div = document.getElementById('pendingList');
        div.innerHTML = "";
        snap.forEach(doc => {
            const p = doc.data();
            div.innerHTML += `
                <div class="card">
                    <b>User:</b> ${p.userName} | <b>Amount:</b> ₹${p.amount} <br>
                    <b>UTR:</b> <span style="color:yellow">${p.utr}</span><br>
                    <button class="btn-approve" onclick="approve('${doc.id}', '${p.userId}', ${p.amount})">Approve & Activate</button>
                    <button class="btn-reject" onclick="reject('${doc.id}')">Reject</button>
                </div>`;
        });
    });
}

function approve(payId, userId, amount) {
    // Logic: ₹1200 gives 1,00,000 coins. Others get ₹1 = 100 coins.
    const coins = (amount === 1200) ? 100000 : (amount * 100);
    const batch = db.batch();
    batch.update(db.collection("Users").doc(userId), {
        membership: "Active",
        coins: firebase.firestore.FieldValue.increment(coins)
    });
    batch.update(db.collection("Payments").doc(payId), { status: "Approved" });
    batch.commit().then(() => alert("User Activated with " + coins + " coins!"));
}

function reject(payId) {
    if(confirm("Reject this payment?")) {
        db.collection("Payments").doc(payId).update({ status: "Rejected" });
    }
}
</script>
</body>
</html>
